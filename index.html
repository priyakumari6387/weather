<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <canvas id="bgCanvas"></canvas>
  <div class="video-bg">
    <video id="bgVideoA" class="bg-video active" autoplay muted loop playsinline src="videos/clear.mp4"></video>
    <video id="bgVideoB" class="bg-video" autoplay muted loop playsinline src="videos/clear.mp4"></video>
  </div>
  <div class="overlay"></div>
  <canvas id="effectsCanvas"></canvas>
  <div class="container">
    <h1 class="app-title">Weather Dashboard</h1>
    <div class="search-box">
      <input type="text" id="city" placeholder="Enter city name" />
      <button onclick="getWeather()">Search</button>
    </div>

    <!-- Weather Wrapper (Left: Current, Right: Chart) -->
    <div id="weather-wrapper" class="weather-wrapper hidden">
      <!-- Current Weather -->
      <div id="current-weather" class="current-weather">
        <div class="current-main">
          <div>
            <h2 id="city-name">--</h2>
            <div id="weather-condition" class="condition">--</div>
            <div id="temp" class="current-temp">--°C</div>
            <button id="unit-toggle" onclick="toggleUnit()">Switch to °F</button>
          </div>
          <img id="weather-icon" class="weather-icon" src="" alt="Weather icon" />
        </div>
        <div class="current-details">
          <div class="detail-item">
            <span class="detail-label">Feels Like</span>
            <span id="feels-like" class="detail-value">--°C</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Humidity</span>
            <span id="humidity" class="detail-value">--%</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Wind</span>
            <span id="wind" class="detail-value">-- km/h</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Wind Dir</span>
            <span id="wind-dir" class="detail-value">--</span>
          </div>
        </div>
      </div>

      <!-- Graph Container (Square) -->
      <div class="chart-container">
        <canvas id="weatherChart"></canvas>
      </div>
    </div>

    <!-- 5-Day Forecast -->
    <div id="forecast-section" class="forecast-section hidden">
      <h2 class="forecast-title">5-Day Forecast</h2>
      <div id="forecast-cards" class="forecast-cards"></div>
    </div>

    <div id="loader" class="loader hidden"></div>
    <div id="error-msg" class="error-msg hidden"></div>
  </div>

  <!-- Use config if present, or we use standard script.js logic -->
  <script src="config.js" onerror="console.warn('config.js not found, fallback to inline api key if present')"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>

</html>
